<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ criterion.label }} Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f6f4ee;
            --panel: rgba(255, 255, 255, 0.82);
            --line: rgba(49, 38, 16, 0.08);
            --text: #191611;
            --muted: #6c6557;
            --accent: #d97706;
            --shadow: 0 24px 70px rgba(83, 63, 25, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            height: 100%;
        }

        body {
            font-family: "Instrument Sans", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(217, 119, 6, 0.10), transparent 28%),
                radial-gradient(circle at bottom right, rgba(13, 91, 215, 0.08), transparent 28%),
                var(--bg);
        }

        .criterion-shell {
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
            padding: 20px;
            gap: 16px;
        }

        .criterion-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 20px;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .criterion-kicker,
        .criterion-back {
            font-family: "IBM Plex Mono", monospace;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .criterion-kicker {
            color: var(--muted);
            display: block;
            margin-bottom: 6px;
        }

        .criterion-title {
            margin: 0;
            font-family: "Newsreader", serif;
            font-size: 34px;
            font-weight: 600;
            letter-spacing: -0.04em;
        }

        .criterion-copy {
            margin: 6px 0 0;
            color: var(--muted);
            max-width: 720px;
        }

        .criterion-back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid var(--line);
            text-decoration: none;
            color: var(--text);
            background: rgba(255, 255, 255, 0.88);
            transition: transform 160ms ease, box-shadow 160ms ease;
        }

        .criterion-back:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        .criterion-frame {
            width: 100%;
            height: calc(100vh - 132px);
            border: 1px solid var(--line);
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.62);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .criterion-frame iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: transparent;
        }

        @media (max-width: 860px) {
            .criterion-shell {
                padding: 12px;
            }

            .criterion-topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .criterion-frame {
                height: calc(100vh - 196px);
            }
        }
    </style>
</head>
<body>
    <div class="criterion-shell">
        <header class="criterion-topbar">
            <div>
                <span class="criterion-kicker">Criterion Page</span>
                <h1 class="criterion-title">{{ criterion.label }}</h1>
                <p class="criterion-copy">{{ criterion.description }}</p>
            </div>
            <a class="criterion-back" href="/">Quay ve page tong</a>
        </header>

        <section class="criterion-frame">
            <iframe
                src="{{ streamlit_url }}"
                title="{{ criterion.label }}"
                loading="eager"
                referrerpolicy="same-origin"
            ></iframe>
        </section>
    </div>
</body>
</html>
